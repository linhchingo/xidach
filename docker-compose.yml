version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xidach-backend
    # Removed direct port mapping for security
    volumes:
      - ./backend:/app
      # Ensure database is persisted on host
      - backend-data:/app/data
    environment:
      - FLASK_ENV=production
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xidach-frontend
    # Removed direct port mapping, accessed via proxy
    depends_on:
      - backend
    restart: always

  proxy:
    image: nginx:alpine
    container_name: xidach-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  backend-data:
