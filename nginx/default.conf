upstream backend_api {
    server backend:5000;
    # Giữ lại tối đa 32 kết nối rảnh rỗi tới backend để không phải mở lại TCP handshake
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # Tối ưu kết nối từ client (trình duyệt)
    keepalive_timeout 300s;
    tcp_nodelay on;

    # Frontend - Serve static files or proxy to frontend container
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend - Proxy API requests to backend container
    location /api/ {
        proxy_pass http://backend_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; # Bắt buộc clear header này để dùng keepalive với upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO WebSocket proxy
    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Optional: Log settings
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
